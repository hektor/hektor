name: metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
permissions:
  contents: write
jobs:
  metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.followers.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_people_types: followers
          plugin_people: yes
